<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBJJ - Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: #999; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333; border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fallback { display: none; margin-top: 20px; }
        .fallback a { color: #4a90d9; text-decoration: none; font-weight: 600; }
        .fallback a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Opening SmartBJJ...</h1>
        <p id="status">Redirecting you to the app.</p>
        <div class="fallback" id="fallback">
            <p>If the app didn't open, <a id="deeplink" href="#">tap here to try again</a>.</p>
            <p style="margin-top: 12px; font-size: 14px;">You can also go back to the SmartBJJ app and sign in.</p>
        </div>
    </div>
    <script>
        (function() {
            var hash = window.location.hash.substring(1);
            var search = window.location.search.substring(1);
            var params = hash || search || '';
            var deepLink = 'smartbjj://auth-callback';
            if (params) { deepLink += '?' + params; }
            var fallbackEl = document.getElementById('fallback');
            var deeplinkEl = document.getElementById('deeplink');
            deeplinkEl.href = deepLink;
            window.location.href = deepLink;
            setTimeout(function() {
                fallbackEl.style.display = 'block';
                document.getElementById('status').textContent = 'If the app opened, you can close this page.';
            }, 2500);
        })();
    </script>
</body>
</html>
